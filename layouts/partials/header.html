<header class="site-header" data-site-header>
  <div class="container header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} home">
      {{ with resources.Get "images/icon.webp" }}
        {{ $brandIcon := . | fingerprint }}
        <img class="brand-mark" src="{{ $brandIcon.RelPermalink }}" width="{{ $brandIcon.Width }}" height="{{ $brandIcon.Height }}" alt="" aria-hidden="true" decoding="async">
      {{ end }}
      <span class="brand-text">Nom Zine</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
    <nav class="site-nav" id="site-nav" aria-label="Main navigation" data-site-nav>
      {{ range site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        <a href="{{ .URL | relURL }}" {{ if $active }}aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
      <form class="nav-search" action="{{ "search/" | relURL }}" method="get" role="search">
        <label class="sr-only" for="nav-search-input">Search site</label>
        <input id="nav-search-input" name="q" type="search" autocomplete="off" placeholder="Search">
        <button type="submit">Search</button>
      </form>
    </nav>
  </div>
</header>
